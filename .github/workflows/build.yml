name: Build OTGCam APKs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-agent:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Accept licenses
      run: yes | sdkmanager --licenses || true
    - name: Install build tools
      run: sdkmanager "build-tools;33.0.2" "platforms;android-33"
    - name: Build Agent APK
      working-directory: ./otgcam-agent
      run: ./gradlew assembleDebug --stacktrace
    - name: Upload Agent APK
      uses: actions/upload-artifact@v4
      with:
        name: otgcam-agent-apk
        path: otgcam-agent/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

  build-receiver:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Accept licenses
      run: yes | sdkmanager --licenses || true
    - name: Install build tools
      run: sdkmanager "build-tools;33.0.2" "platforms;android-33"
    - name: Build Receiver APK
      working-directory: ./otgcam-receiver
      run: ./gradlew assembleDebug --stacktrace
    - name: Upload Receiver APK
      uses: actions/upload-artifact@v4
      with:
        name: otgcam-receiver-apk
        path: otgcam-receiver/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
